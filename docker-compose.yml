version: "3.8"

services:
  postgres_data:
    image: postgres:16
    container_name: postgres_data
    restart: unless-stopped
    environment:
      POSTGRES_USER: data_user
      POSTGRES_PASSWORD: data_password
      POSTGRES_DB: my_dataset
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_volume:/var/lib/postgresql/data
      - ./data:/data/company
    networks:
      - data_network

  airflow_db:
    image: postgres:16
    container_name: airflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - data_network

  superset_app:
    image: apache/superset:latest-dev
    container_name: superset_app
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: temporarySecretKey
      DATABASE_DB: superset
      DATABASE_HOST: postgres_data
      DATABASE_PASSWORD: data_password
      DATABASE_USER: data_user
    networks:
      - data_network

  airflow:
    image: apache/airflow:2.9.0
    container_name: airflow
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_db:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: temporary_airflow_secret_key
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data/company
      - ./logs:/opt/airflow/logs
    depends_on:
      - airflow_db
      - postgres_data
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin &&
        airflow webserver -p 8080 -h 0.0.0.0
      "
    networks:
      - data_network

volumes:
  postgres_data_volume:
  airflow_db_data:

networks:
  data_network:
    driver: bridge
